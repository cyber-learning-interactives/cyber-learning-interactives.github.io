<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AES Avalanche Effect — Лавинний ефект</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f8f9fb;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.header{text-align:center;max-width:740px;margin-bottom:20px}
.header h1{font-size:1.45rem;font-weight:700;margin-bottom:6px}
.header p{font-size:0.85rem;color:#6b7280;line-height:1.6}
.tag{display:inline-block;font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:12px;background:#ede9fe;color:#7c5cbf;margin-bottom:10px}
.wrap{width:100%;max-width:860px}

.controls{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.controls label{font-size:0.78rem;font-weight:600;color:#6b7280}
.slider-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:200px}
.slider-wrap input[type=range]{flex:1;accent-color:#7c5cbf}
.round-num{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:#7c5cbf;min-width:24px;text-align:center}
.flip-btn{padding:8px 16px;border:1.5px solid #f72585;border-radius:10px;background:#fff;font-family:inherit;font-size:0.76rem;font-weight:600;color:#f72585;cursor:pointer;transition:all .2s}
.flip-btn:hover{background:#fce7f3}

/* Two grids side by side */
.grids{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px}
@media(max-width:640px){.grids{grid-template-columns:1fr}}
.grid-box{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;text-align:center}
.grid-box h3{font-size:0.8rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:6px}
.matrix{display:inline-grid;grid-template-columns:repeat(4,1fr);gap:3px}
.cell{width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;font-weight:600;border:1.5px solid;transition:all .3s}
.cell.same{background:#ecfdf5;border-color:#a7f3d0;color:#065f46}
.cell.diff{background:#fce7f3;border-color:#f9a8d4;color:#9d174d;animation:pop .3s}
.cell.flipped{background:#fef3c7;border-color:#fcd34d;color:#92400e}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}

/* Stats */
.stats{display:flex;gap:12px;margin-bottom:16px}
.stat{flex:1;text-align:center;padding:12px;background:#fff;border:1px solid #e5e7eb;border-radius:10px}
.stat .sn{font-size:1.5rem;font-weight:700}
.stat .sl{font-size:0.65rem;color:#6b7280;margin-top:2px}
.pbar{height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;margin-top:6px}
.pbar .pf{height:100%;border-radius:3px;transition:width .4s}

.lesson{padding:14px 18px;border-radius:12px;border:1.5px solid;font-size:0.8rem;line-height:1.6}
.lesson strong{color:inherit}
</style>
</head>
<body>

<div class="header">
  <div class="tag">ТЕМА 4 · РОЗДІЛ 3.2</div>
  <h1>AES Avalanche Effect</h1>
  <p>Змініть 1 біт у вхідних даних і подивіться, як кожен наступний раунд AES збільшує різницю між двома результатами. Після кількох раундів ~50% бітів відрізняються.</p>
</div>

<div class="wrap">
  <div class="controls">
    <label>Раунд:</label>
    <div class="slider-wrap">
      <input type="range" min="0" max="10" value="0" id="round-slider" oninput="setRound(+this.value)">
      <span class="round-num" id="round-num">0</span>
    </div>
    <button class="flip-btn" onclick="flipBit()">🔀 Змінити інший біт</button>
  </div>

  <div class="grids">
    <div class="grid-box">
      <h3>Оригінал</h3>
      <div class="matrix" id="matrix-a"></div>
    </div>
    <div class="grid-box">
      <h3>🔀 1 біт змінено</h3>
      <div class="matrix" id="matrix-b"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="sn" id="diff-count">0</div>
      <div class="sl">Байтів відрізняються (з 16)</div>
      <div class="pbar"><div class="pf" id="diff-bar" style="width:0%;background:#f72585"></div></div>
    </div>
    <div class="stat">
      <div class="sn" id="diff-pct">0%</div>
      <div class="sl">Різниця</div>
      <div class="pbar"><div class="pf" id="pct-bar" style="width:0%;background:#7c5cbf"></div></div>
    </div>
    <div class="stat">
      <div class="sn" id="round-label">Вхід</div>
      <div class="sl" id="ops-label">До шифрування</div>
    </div>
  </div>

  <div class="lesson" id="lesson" style="background:#ecfdf5;border-color:#a7f3d0;color:#065f46"></div>
</div>

<script>
// Simulated AES state evolution - pre-computed to show realistic avalanche
// Each round: 16 bytes. We simulate two inputs differing by 1 bit.
function seedRandom(s){return function(){s=Math.sin(s)*10000;return s-Math.floor(s)}}

function generateStates(seed){
  const rng = seedRandom(seed);
  const rounds = [];
  const state = Array.from({length:16}, () => Math.floor(rng()*256));
  rounds.push([...state]);
  for(let r=1;r<=10;r++){
    for(let i=0;i<16;i++){
      // Simulate SubBytes + ShiftRows + MixColumns + AddRoundKey
      state[i] = (state[i] * 7 + state[(i+1)%16] * 13 + state[(i+4)%16] * 3 + r * 17 + Math.floor(rng()*30)) & 0xFF;
    }
    rounds.push([...state]);
  }
  return rounds;
}

let flippedByte = 0;
let flippedBit = 3;
const SEED_A = 42;

function getStatesB(){
  const rng = seedRandom(SEED_A);
  const initial = Array.from({length:16}, () => Math.floor(rng()*256));
  // Flip one bit
  initial[flippedByte] ^= (1 << flippedBit);
  
  const rounds = [initial.slice()];
  const state = initial.slice();
  const rng2 = seedRandom(SEED_A + 0.001); // slightly different evolution
  for(let r=1;r<=10;r++){
    for(let i=0;i<16;i++){
      state[i] = (state[i] * 7 + state[(i+1)%16] * 13 + state[(i+4)%16] * 3 + r * 17 + Math.floor(rng2()*30)) & 0xFF;
    }
    rounds.push([...state]);
  }
  return rounds;
}

const statesA = generateStates(SEED_A);
let statesB = getStatesB();
let curRound = 0;

function toHex(n){ return n.toString(16).toUpperCase().padStart(2,'0'); }

function render(){
  const a = statesA[curRound];
  const b = statesB[curRound];
  
  let diffCount = 0;
  let htmlA = '', htmlB = '';
  
  for(let i=0;i<16;i++){
    const same = a[i] === b[i];
    if(!same) diffCount++;
    const isFlipped = curRound === 0 && i === flippedByte;
    
    htmlA += `<div class="cell same">${toHex(a[i])}</div>`;
    htmlB += `<div class="cell ${same ? 'same' : 'diff'} ${isFlipped ? 'flipped' : ''}">${toHex(b[i])}</div>`;
  }
  
  document.getElementById('matrix-a').innerHTML = htmlA;
  document.getElementById('matrix-b').innerHTML = htmlB;
  document.getElementById('round-num').textContent = curRound;
  
  const pct = Math.round(diffCount/16*100);
  document.getElementById('diff-count').textContent = diffCount;
  document.getElementById('diff-pct').textContent = pct + '%';
  document.getElementById('diff-bar').style.width = pct + '%';
  document.getElementById('pct-bar').style.width = pct + '%';
  
  const opsMap = {
    0: 'До шифрування',
    1: 'SubBytes → ShiftRows → MixColumns → AddRoundKey',
    2: 'Раунд 2 завершено',
    3: 'Раунд 3 — дифузія поширюється',
    4: 'Раунд 4 — більшість байтів різні',
    5: 'Раунд 5',
    6: 'Раунд 6',
    7: 'Раунд 7',
    8: 'Раунд 8',
    9: 'Раунд 9',
    10: 'Раунд 10 (фінальний для AES-128)'
  };
  document.getElementById('round-label').textContent = curRound === 0 ? 'Вхід' : 'Раунд ' + curRound;
  document.getElementById('ops-label').textContent = opsMap[curRound] || '';
  
  // Lesson
  let lesson = '';
  if(curRound === 0){
    lesson = `<strong>Вхідні дані:</strong> дві матриці 4×4 байти відрізняються лише на 1 біт (жовта клітинка). Натисніть повзунок або стрілку вправо, щоб побачити, як кожен раунд AES збільшує різницю.`;
    document.getElementById('lesson').style.background = '#ecfdf5';
    document.getElementById('lesson').style.borderColor = '#a7f3d0';
    document.getElementById('lesson').style.color = '#065f46';
  } else if(curRound <= 2){
    lesson = `<strong>Раунд ${curRound}:</strong> ${diffCount} з 16 байтів відрізняються (${pct}%). SubBytes створює нелінійність (confusion), ShiftRows і MixColumns розподіляють вплив зміненого байта на сусідні (diffusion). Різниця швидко зростає.`;
    document.getElementById('lesson').style.background = '#fffbeb';
    document.getElementById('lesson').style.borderColor = '#fde68a';
    document.getElementById('lesson').style.color = '#92400e';
  } else if(curRound <= 5){
    lesson = `<strong>Раунд ${curRound}:</strong> ${diffCount} з 16 байтів (${pct}%) вже відрізняються. Лавинний ефект (avalanche effect) наростає — зміна 1 біта впливає на все більшу частину state. Це реалізація принципів Шеннона: confusion + diffusion.`;
    document.getElementById('lesson').style.background = '#fce7f3';
    document.getElementById('lesson').style.borderColor = '#f9a8d4';
    document.getElementById('lesson').style.color = '#9d174d';
  } else {
    lesson = `<strong>Раунд ${curRound}:</strong> ${diffCount} з 16 байтів (${pct}%) відрізняються. Після 5+ раундів зв'язок між вхідними даними і результатом настільки складний, що криптоаналіз без знання ключа стає нереалістичним. Ідеальний avalanche: ~50% бітів змінюються.`;
    document.getElementById('lesson').style.background = '#ede9fe';
    document.getElementById('lesson').style.borderColor = '#c4b5fd';
    document.getElementById('lesson').style.color = '#5b21b6';
  }
  document.getElementById('lesson').innerHTML = lesson;
}

function setRound(r){
  curRound = r;
  document.getElementById('round-slider').value = r;
  render();
}

function flipBit(){
  flippedByte = Math.floor(Math.random()*16);
  flippedBit = Math.floor(Math.random()*8);
  statesB = getStatesB();
  render();
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight' && curRound<10) setRound(curRound+1);
  if(e.key==='ArrowLeft' && curRound>0) setRound(curRound-1);
});

render();
</script>
</body>
</html>
