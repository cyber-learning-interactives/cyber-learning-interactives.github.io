<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hash Decision Tree — Правильний інструмент для задачі</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f8f9fb;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.header{text-align:center;max-width:720px;margin-bottom:28px}
.header h1{font-size:1.5rem;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}
.header p{font-size:0.85rem;color:#6b7280;line-height:1.5}
.tag{display:inline-block;font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:12px;background:#ede9fe;color:#7c5cbf;margin-bottom:10px}

.wrap{width:100%;max-width:820px}

/* Question */
.question{text-align:center;padding:20px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;margin-bottom:20px}
.question h2{font-size:1.1rem;font-weight:700;margin-bottom:16px}
.options{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;margin:0 auto}
.opt{padding:16px;border:2px solid #e5e7eb;border-radius:12px;cursor:pointer;transition:all .2s;text-align:left;background:#fff}
.opt:hover{border-color:#7c5cbf;background:#faf5ff}
.opt.selected{border-color:var(--c);background:var(--bg)}
.opt .opt-icon{font-size:1.3rem;margin-bottom:4px}
.opt .opt-title{font-size:0.85rem;font-weight:700;color:#1a1a2e;margin-bottom:2px}
.opt .opt-q{font-size:0.72rem;color:#6b7280}

/* Result card */
.result{background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;animation:fadeUp .4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-header{padding:18px 24px;display:flex;align-items:center;gap:12px}
.result-header .r-icon{font-size:1.6rem}
.result-header h3{font-size:1rem;font-weight:700;flex:1}
.result-header .r-tag{font-size:0.68rem;font-weight:600;padding:4px 12px;border-radius:10px;color:#fff}
.result-body{padding:0 24px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rcard{padding:14px;border-radius:10px;border:1px solid #f3f4f6;background:#f9fafb}
.rcard.full{grid-column:1/-1}
.rcard .rlabel{font-size:0.62rem;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.rcard .rval{font-size:0.82rem;color:#1a1a2e;line-height:1.5}
.rcard code{font-family:'JetBrains Mono',monospace;font-size:0.78rem;background:#ede9fe;padding:1px 6px;border-radius:4px;color:#5b21b6}

/* Mistake card */
.mistake{margin:0 24px 20px;padding:14px 16px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px}
.mistake h4{font-size:0.78rem;font-weight:700;color:#dc2626;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.mistake p{font-size:0.76rem;color:#7f1d1d;line-height:1.5}

/* Speed comparison */
.speed{margin:0 24px 20px;padding:14px 16px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:10px}
.speed h4{font-size:0.72rem;font-weight:600;color:#6b7280;margin-bottom:8px}
.speed-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.speed-label{width:100px;font-size:0.72rem;font-weight:600;color:#1a1a2e;text-align:right}
.speed-bar{height:20px;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:0.62rem;font-weight:600;color:#fff;transition:width .6s;min-width:40px}
.speed-note{font-size:0.65rem;color:#9ca3af;margin-top:4px}

/* Reset */
.reset-row{text-align:center;margin-top:16px}
.reset-btn{padding:8px 20px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-family:inherit;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .2s}
.reset-btn:hover{border-color:#7c5cbf;background:#faf5ff}
</style>
</head>
<body>

<div class="header">
  <div class="tag">ТЕМА 5 · РОЗДІЛ 6</div>
  <h1>Хеш-функції: правильний інструмент для задачі</h1>
  <p>SHA-256, Argon2, HMAC і цифровий підпис вирішують різні задачі. Оберіть задачу, щоб побачити правильний вибір і типову помилку.</p>
</div>

<div class="wrap">
  <div class="question" id="question"></div>
  <div id="result"></div>
  <div class="reset-row" id="reset-row" style="display:none">
    <button class="reset-btn" onclick="reset()">← Обрати іншу задачу</button>
  </div>
</div>

<script>
const tasks = [
  {
    id: 'integrity',
    icon: '🔍',
    title: 'Цілісність',
    question: 'Чи змінено дані?',
    color: '#14b8a6',
    bg: '#ecfdf5',
    algo: 'SHA-256 / SHA-3 / Купина',
    algoCode: 'sha256(file) → digest',
    speed: 'Швидка',
    speedPct: 95,
    speedColor: '#14b8a6',
    key: 'Немає ключа — будь-хто може обчислити',
    examples: 'Перевірка файлів, артефактів моделі, checksum завантажень, blockchain',
    hrAi: 'Перевірка цілісності ваг моделі та конфігурацій перед inference',
    mistake: 'Використовувати MD5 або SHA-1 — обидва мають знайдені колізії. MD5 зламаний з 2004, SHA-1 — з 2017 (SHAttered).',
    speedCompare: [
      { label: 'SHA-256', pct: 95, color: '#14b8a6', val: '~1 ГБ/с' },
      { label: 'SHA-3', pct: 70, color: '#0d9488', val: '~700 МБ/с' },
      { label: 'MD5 ⚠', pct: 98, color: '#d1d5db', val: '~1.2 ГБ/с (зламаний)' },
    ]
  },
  {
    id: 'passwords',
    icon: '🔐',
    title: 'Паролі',
    question: 'Зберігання без відновлення',
    color: '#f72585',
    bg: '#fce7f3',
    algo: 'Argon2id / bcrypt / scrypt',
    algoCode: 'argon2id(password, salt, params) → hash',
    speed: 'Навмисно повільна (~100 мс)',
    speedPct: 3,
    speedColor: '#f72585',
    key: 'Salt — індивідуальний для кожного пароля',
    examples: 'Паролі користувачів, master passwords, PIN-коди',
    hrAi: 'Паролі рекрутерів і адміністраторів HR AI. API-токени — через SHA-256 (не Argon2).',
    mistake: 'Зберігати паролі як SHA-256 (навіть із salt). SHA-256 занадто швидкий: GPU обчислює мільярди хешів/с. LinkedIn (2012) зберігав SHA-1 без salt — 6.5 млн хешів зламано за дні.',
    speedCompare: [
      { label: 'SHA-256 ⚠', pct: 95, color: '#d1d5db', val: '~млрд/с на GPU (небезпечно!)' },
      { label: 'bcrypt', pct: 5, color: '#ec4899', val: '~10–20/с (безпечно)' },
      { label: 'Argon2id ✓', pct: 3, color: '#f72585', val: '~10/с (рекомендовано)' },
    ]
  },
  {
    id: 'auth',
    icon: '🤝',
    title: 'Автентифікація',
    question: 'Хто відправив повідомлення?',
    color: '#7c5cbf',
    bg: '#ede9fe',
    algo: 'HMAC-SHA256',
    algoCode: 'HMAC(shared_key, message) → tag',
    speed: 'Швидка',
    speedPct: 90,
    speedColor: '#7c5cbf',
    key: 'Спільний секретний ключ (обидві сторони)',
    examples: 'API-запити (AWS SigV4), webhook callbacks, JWT-токени, IPsec',
    hrAi: 'Автентифікація запитів між мікросервісами HR AI через HMAC-SHA256',
    mistake: 'Плутати HMAC із цифровим підписом. HMAC доводить автентичність між двома сторонами зі спільним ключем. Але він НЕ доводить авторство третій стороні (аудитору, суду) — бо обидві сторони мають ключ.',
    speedCompare: [
      { label: 'HMAC-SHA256', pct: 90, color: '#7c5cbf', val: '~800 МБ/с' },
      { label: 'HMAC-SHA512', pct: 75, color: '#6d28d9', val: '~600 МБ/с' },
    ]
  },
  {
    id: 'nonrepud',
    icon: '✍️',
    title: 'Невідмовність',
    question: 'Доказ авторства для третіх сторін',
    color: '#3b82f6',
    bg: '#dbeafe',
    algo: 'Hash + цифровий підпис (EdDSA / ECDSA)',
    algoCode: 'sign(private_key, sha256(doc)) → signature',
    speed: 'Середня (підпис повільніший за hash)',
    speedPct: 40,
    speedColor: '#3b82f6',
    key: 'Private key автора (тільки він має)',
    examples: 'Audit-логи, підписання документів, сертифікати X.509, підпис коду',
    hrAi: 'Підписання audit-логів HR AI для traceability (AI Act Art. 12). Аудитор може перевірити, що запис не змінювався.',
    mistake: 'Використовувати лише hash або HMAC для audit-логів. Hash доводить цілісність, але не авторство. HMAC доводить автентичність, але не третій стороні. Тільки цифровий підпис дає невідмовність.',
    speedCompare: [
      { label: 'Ed25519 sign', pct: 40, color: '#3b82f6', val: '~50,000/с' },
      { label: 'Ed25519 verify', pct: 55, color: '#60a5fa', val: '~70,000/с' },
      { label: 'RSA-2048 sign', pct: 8, color: '#93c5fd', val: '~1,000/с' },
    ]
  },
];

let selected = null;

function renderQuestion() {
  let html = `<h2>Яку задачу потрібно вирішити?</h2><div class="options">`;
  tasks.forEach(t => {
    html += `<div class="opt" style="--c:${t.color};--bg:${t.bg}" onclick="select('${t.id}')">
      <div class="opt-icon">${t.icon}</div>
      <div class="opt-title">${t.title}</div>
      <div class="opt-q">${t.question}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('question').innerHTML = html;
}

function select(id) {
  selected = tasks.find(t => t.id === id);
  // Highlight option
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  renderResult();
}

function renderResult() {
  const t = selected;
  if (!t) { document.getElementById('result').innerHTML = ''; return; }
  
  let html = `<div class="result">
    <div class="result-header" style="background:${t.bg}">
      <span class="r-icon">${t.icon}</span>
      <h3>${t.title}: ${t.question}</h3>
      <span class="r-tag" style="background:${t.color}">${t.algo.split(' / ')[0]}</span>
    </div>
    <div class="result-body">
      <div class="rcard">
        <div class="rlabel">Алгоритм</div>
        <div class="rval"><code>${t.algoCode}</code></div>
      </div>
      <div class="rcard">
        <div class="rlabel">Ключ</div>
        <div class="rval">${t.key}</div>
      </div>
      <div class="rcard">
        <div class="rlabel">Рекомендація</div>
        <div class="rval" style="font-weight:600">${t.algo}</div>
      </div>
      <div class="rcard">
        <div class="rlabel">Приклади</div>
        <div class="rval">${t.examples}</div>
      </div>
      <div class="rcard full">
        <div class="rlabel">У HR AI</div>
        <div class="rval">${t.hrAi}</div>
      </div>
    </div>`;
  
  // Speed comparison
  html += `<div class="speed">
    <h4>⚡ Порівняння швидкості</h4>`;
  t.speedCompare.forEach(s => {
    html += `<div class="speed-row">
      <div class="speed-label">${s.label}</div>
      <div class="speed-bar" style="width:${Math.max(s.pct, 8)}%;background:${s.color}">${s.val}</div>
    </div>`;
  });
  if (t.id === 'passwords') {
    html += `<div class="speed-note">Для паролів повільність — це перевага: кожна спроба brute-force коштує дорого.</div>`;
  }
  html += `</div>`;

  // Mistake
  html += `<div class="mistake">
    <h4>✗ Типова помилка</h4>
    <p>${t.mistake}</p>
  </div>`;

  html += `</div>`;
  
  document.getElementById('result').innerHTML = html;
  document.getElementById('reset-row').style.display = 'block';
}

function reset() {
  selected = null;
  document.getElementById('result').innerHTML = '';
  document.getElementById('reset-row').style.display = 'none';
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
}

renderQuestion();
</script>
</body>
</html>
