<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compliance Evidence Matrix — Що потрібно аудитору</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#f8f9fb;color:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.header{text-align:center;max-width:740px;margin-bottom:24px}
.header h1{font-size:1.45rem;font-weight:700;margin-bottom:6px}
.header p{font-size:0.85rem;color:#6b7280;line-height:1.6}
.tag{display:inline-block;font-size:0.7rem;font-weight:600;padding:3px 10px;border-radius:12px;background:#ede9fe;color:#7c5cbf;margin-bottom:10px}
.wrap{width:100%;max-width:900px}

/* Artifacts */
.artifacts{display:flex;flex-direction:column;gap:12px}
.artifact{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer}
.artifact:hover{border-color:#7c5cbf}
.artifact.open{border-color:#7c5cbf;box-shadow:0 2px 12px rgba(124,92,191,.1)}
.a-header{padding:14px 18px;display:flex;align-items:center;gap:12px}
.a-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:#fff;flex-shrink:0}
.a-info{flex:1}
.a-info h3{font-size:0.88rem;font-weight:700;margin-bottom:2px}
.a-info p{font-size:0.72rem;color:#6b7280}
.a-arrow{font-size:1rem;color:#d1d5db;transition:transform .3s}
.artifact.open .a-arrow{transform:rotate(90deg);color:#7c5cbf}
.a-topics{display:flex;gap:4px;flex-wrap:wrap}
.a-topic{font-size:0.58rem;font-weight:600;padding:2px 7px;border-radius:5px;background:#ede9fe;color:#7c5cbf}

.a-body{padding:0 18px 16px;display:none}
.artifact.open .a-body{display:block}
.a-body .desc{font-size:0.8rem;color:#4b5563;line-height:1.6;margin-bottom:12px}

/* Checklist */
.checklist{display:flex;flex-direction:column;gap:6px}
.check-item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:#f9fafb;border-radius:8px;border:1px solid #f3f4f6;font-size:0.76rem;line-height:1.4}
.check-item .ci-icon{font-size:0.85rem;flex-shrink:0;margin-top:1px;cursor:pointer}
.check-item .ci-text{flex:1;color:#4b5563}
.check-item .ci-topic{font-size:0.6rem;font-weight:600;color:#9ca3af;white-space:nowrap}
.check-item.checked{background:#ecfdf5;border-color:#a7f3d0}
.check-item.checked .ci-text{color:#065f46}

/* Regs */
.regs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.reg{font-size:0.62rem;font-weight:600;padding:2px 8px;border-radius:6px}

/* Progress */
.progress{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px 20px;margin-top:20px;text-align:center}
.progress h4{font-size:0.82rem;font-weight:700;margin-bottom:8px}
.pbar{height:10px;background:#f3f4f6;border-radius:5px;overflow:hidden;margin-bottom:6px}
.pbar .pfill{height:100%;background:#10b981;border-radius:5px;transition:width .4s}
.ptext{font-size:0.72rem;color:#6b7280}
</style>
</head>
<body>

<div class="header">
  <div class="tag">ТЕМА 14 · CAPSTONE</div>
  <h1>Compliance Evidence Matrix</h1>
  <p>Які артефакти аудитор очікує побачити, звідки вони з'являються в курсі, і що конкретно потрібно підготувати. Натисніть на артефакт, щоб побачити чекліст.</p>
</div>

<div class="wrap">
  <div class="artifacts" id="artifacts"></div>
  <div class="progress" id="progress"></div>
</div>

<script>
const artifacts = [
  { num:'1', color:'#7c5cbf', name:'Encryption Coverage Map', sub:'Де застосовується шифрування і де прогалини',
    topics:['Т2','Т4','Т8','Т9'],
    regs:[{t:'GDPR Art. 32',bg:'#dbeafe',c:'#1e40af'},{t:'ISO 27001 A.10',bg:'#e0e7ff',c:'#3730a3'}],
    desc:'Документ, який для кожного компонента системи фіксує: чи застосоване шифрування, яким алгоритмом, хто контролює ключ, де розриви. Введений у темі 2, формалізований у темі 8.',
    checks:[
      {text:'Для кожного компонента: тип шифрування (SSE-KMS, TDE, FDE, none)', topic:'Т8'},
      {text:'Алгоритм і режим (AES-256-GCM, ChaCha20, etc.)', topic:'Т4'},
      {text:'Управління ключами (KMS managed, BYOK, self-managed)', topic:'Т10'},
      {text:'In-transit покриття: TLS-версія і cipher suite для кожного каналу', topic:'Т9'},
      {text:'Виявлені прогалини і план їх закриття', topic:'Т2'},
    ]},
  { num:'2', color:'#f72585', name:'Key Management Policy', sub:'Як генеруються, зберігаються і ротуються ключі',
    topics:['Т4','Т10'],
    regs:[{t:'GDPR Art. 32',bg:'#dbeafe',c:'#1e40af'},{t:'ISO 27001 A.10',bg:'#e0e7ff',c:'#3730a3'},{t:'NIST SP 800-57',bg:'#ecfdf5',c:'#065f46'}],
    desc:'Документ, що описує весь життєвий цикл ключів: від генерації до знищення. Аудитор перевіряє не алгоритм (AES-256 задовольняє будь-яку регуляцію), а процеси навколо нього.',
    checks:[
      {text:'Генерація: CSPRNG, KMS/HSM, ніколи на dev-машині', topic:'Т4'},
      {text:'Зберігання: централізовано в KMS, ніколи в коді або змінних середовища', topic:'Т10'},
      {text:'Контроль доступу: IAM policy + key policy для кожного CMK', topic:'Т10'},
      {text:'Ротація: графік, автоматична чи ручна, процедура re-encryption', topic:'Т10'},
      {text:'Знищення: процедура disable → waiting period → delete', topic:'Т10'},
      {text:'Incident response: що робити при підозрі на компрометацію ключа', topic:'Т10'},
    ]},
  { num:'3', color:'#3b82f6', name:'IAM Policies для KMS', sub:'Хто має доступ до яких ключів',
    topics:['Т10'],
    regs:[{t:'GDPR Art. 32',bg:'#dbeafe',c:'#1e40af'},{t:'AI Act Art. 15',bg:'#fce7f3',c:'#9d174d'}],
    desc:'Конкретні документи (JSON policies), що показують, які сервіси/ролі мають доступ до яких ключів і для яких операцій. Принцип least privilege.',
    checks:[
      {text:'Перелік усіх IAM roles з kms:* permissions', topic:'Т10'},
      {text:'Key policy для кожного CMK: хто може Encrypt, Decrypt, ScheduleKeyDeletion', topic:'Т10'},
      {text:'Condition keys: обмеження за VPC, сервісом, encryption context', topic:'Т10'},
      {text:'Обґрунтування: чому кожен сервіс має саме такий рівень доступу', topic:'Т10'},
    ]},
  { num:'4', color:'#14b8a6', name:'Audit Logs', sub:'Записи всіх операцій з ключами і даними',
    topics:['Т7','Т10'],
    regs:[{t:'GDPR Art. 32',bg:'#dbeafe',c:'#1e40af'},{t:'AI Act Art. 12',bg:'#fce7f3',c:'#9d174d'},{t:'ISO 27001',bg:'#e0e7ff',c:'#3730a3'}],
    desc:'Журнал, що фіксує кожну операцію з ключем: хто, коли, з якої адреси, з яким результатом. CloudTrail для KMS. Підписані записи для невідмовності.',
    checks:[
      {text:'CloudTrail увімкнений для всіх KMS-операцій', topic:'Т10'},
      {text:'Логи зберігаються ≥90 днів (або за вимогами регуляції)', topic:'Т10'},
      {text:'Цифровий підпис audit-записів (EdDSA / ECDSA)', topic:'Т7'},
      {text:'Моніторинг аномалій: alerting на незвичні Decrypt-операції', topic:'Т10'},
      {text:'Логи захищені від модифікації (append-only, окремий KEK)', topic:'Т7'},
    ]},
  { num:'5', color:'#f59e0b', name:'Evidence ротації', sub:'Підтвердження, що ротація відбувається за графіком',
    topics:['Т4','Т10'],
    regs:[{t:'NIST SP 800-57',bg:'#ecfdf5',c:'#065f46'},{t:'PCI DSS',bg:'#fef3c7',c:'#92400e'}],
    desc:'Підтвердження, що ключі ротуються за визначеним графіком. Записи в CloudTrail про RotateKey, журнал змін key versions.',
    checks:[
      {text:'Записи RotateKey у CloudTrail за останні 12 місяців', topic:'Т10'},
      {text:'Кількість активних key versions для кожного CMK', topic:'Т10'},
      {text:'Графік ротації задокументований і виконується', topic:'Т10'},
    ]},
];

let checked = {};
let openArtifact = null;

function totalChecks(){ return artifacts.reduce((s,a)=>s+a.checks.length,0); }
function doneChecks(){ return Object.values(checked).filter(Boolean).length; }

function renderArtifacts(){
  document.getElementById('artifacts').innerHTML = artifacts.map(a => {
    const isOpen = openArtifact === a.num;
    return `<div class="artifact ${isOpen?'open':''}" onclick="toggleArt('${a.num}')">
      <div class="a-header">
        <div class="a-num" style="background:${a.color}">${a.num}</div>
        <div class="a-info">
          <h3>${a.name}</h3>
          <p>${a.sub}</p>
        </div>
        <div class="a-topics">${a.topics.map(t=>`<span class="a-topic">${t}</span>`).join('')}</div>
        <div class="a-arrow">›</div>
      </div>
      <div class="a-body">
        <div class="desc">${a.desc}</div>
        <div class="regs">${a.regs.map(r=>`<span class="reg" style="background:${r.bg};color:${r.c}">${r.t}</span>`).join('')}</div>
        <div style="margin-top:12px;font-size:0.7rem;font-weight:700;color:#6b7280;margin-bottom:8px">ЧЕКЛІСТ</div>
        <div class="checklist">${a.checks.map((c,i) => {
          const key = a.num+'-'+i;
          const done = checked[key];
          return `<div class="check-item ${done?'checked':''}" onclick="event.stopPropagation();toggleCheck('${key}')">
            <span class="ci-icon">${done?'✅':'⬜'}</span>
            <span class="ci-text">${c.text}</span>
            <span class="ci-topic">${c.topic}</span>
          </div>`;
        }).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleArt(num){
  openArtifact = openArtifact === num ? null : num;
  renderArtifacts();
  renderProgress();
}

function toggleCheck(key){
  checked[key] = !checked[key];
  renderArtifacts();
  renderProgress();
}

function renderProgress(){
  const done = doneChecks(), total = totalChecks();
  const pct = Math.round(done/total*100);
  document.getElementById('progress').innerHTML = `
    <h4>Готовність до аудиту</h4>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
    <div class="ptext">${done} / ${total} пунктів (${pct}%)</div>`;
}

renderArtifacts();
renderProgress();
</script>
</body>
</html>
